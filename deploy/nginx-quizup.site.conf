# QuizUp — reverse proxy to Node (PM2) on port 8080
# Install on server:
#   sudo cp deploy/nginx-quizup.site.conf /etc/nginx/sites-available/quizup.site.conf
#   sudo ln -sf /etc/nginx/sites-available/quizup.site.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS (Namecheap Advanced DNS for quizup.site):
#   A Record  @     → 82.29.160.45
#   A Record  www   → 82.29.160.45
#   Remove conflicting www CNAMEs / parking records.
#
# HTTPS (after DNS propagates):
#   sudo certbot --nginx -d www.quizup.site -d quizup.site

server {
    listen 80;
    listen [::]:80;
    server_name www.quizup.site quizup.site;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
